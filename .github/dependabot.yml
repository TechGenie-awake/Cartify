version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    labels:
      - dependencies
      - server

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    labels:
      - dependencies
      - client

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
