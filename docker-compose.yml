version: '3.9'

services:
  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=5000
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - server

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cartify
      POSTGRES_PASSWORD: cartify
      POSTGRES_DB: cartify
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
